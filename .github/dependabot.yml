version: 2
updates:
  # 1. Actualizaciones para npm (package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # 2. Actualizaciones para Docker (Dockerfile.frontend, Dockerfile.backend)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # 3. Actualizaciones para GitHub Actions (Workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
